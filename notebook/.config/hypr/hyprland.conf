# #######################################################################################
# HYPRLAND v0.53+ CONFIG - LIMPA E CORRIGIDA
# #######################################################################################

# --- MONITORES ---
monitor=,preferred,auto,1.2
# Monitor Samsung (99.93Hz forçado conforme seu hardware)
monitor=HDMI-A-2, 1920x1080@99.93, auto-right, 1
# TV em 4K com interface aumentada para navegar do sofá
# monitor = HDMI-A-2, 3840x2160@60, 1600x0, 1.5

# --- PROGRAMAS ---
$terminal = kitty
$fileManager = nautilus
$menu = wofi --show drun

# --- VARIAVEIS DE AMBIENTE ---
env = QT_QPA_PLATFORMTHEME,qt6ct
env = XCURSOR_THEME,Bibata-Modern-Ice
env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24

# --- AUTOSTART ---
exec-once = sleep 1 && hyprpaper
exec-once = waybar
exec-once = swaync
exec-once = hypridle
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store

# --- APARENCIA GERAL ---
general {
    gaps_in = 5
    gaps_out = 20
    border_size = 2
    col.active_border = rgb(74c7ec) rgb(cba6f7) 45deg
    col.inactive_border = rgb(313244)
    resize_on_border = false
    allow_tearing = false
    layout = dwindle
}

# --- DECORAÇÃO (Sintaxe Nova v0.53) ---
decoration {
    rounding = 12
    active_opacity = 1.0
    inactive_opacity = 1.0

    # Nova sintaxe de sombra
    shadow {
        enabled = true
        range = 4
        render_power = 3
        color = rgba(1a1a1aee)
    }

    blur {
        enabled = true
        size = 6
        passes = 3
        vibrancy = 0.1696
        ignore_opacity = true
    }
}

# --- ANIMAÇÕES ---
animations {
    enabled = yes
    bezier = myBezier, 0.05, 0.9, 0.1, 1.05
    animation = windows, 1, 7, myBezier
    animation = windowsOut, 1, 7, default, popin 80%
    animation = border, 1, 10, default
    animation = borderangle, 1, 8, default
    animation = fade, 1, 7, default
    animation = workspaces, 1, 6, default
}

# --- LAYOUTS ---
dwindle {
    pseudotile = true
    preserve_split = true
}

misc {
    force_default_wallpaper = 0
    disable_hyprland_logo = true
    focus_on_activate = true
}

# --- INPUT (TECLADO/MOUSE) ---
input {
    kb_layout = br
    kb_variant = abnt2
    follow_mouse = 1
    sensitivity = 0
    touchpad {
        natural_scroll = false
    }
}

# --- ATALHOS (KEYBINDINGS) ---
$mainMod = SUPER

bind = $mainMod, Return, exec, $terminal
bind = $mainMod, C, killactive
bind = $mainMod SHIFT, C, exec, hyprctl kill
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, Space, exec, $menu
bind = $mainMod, B, exec, firefox
bind = $mainMod, T, exec, kitty
bind = $mainMod SHIFT, R, exec, hyprctl reload

# Screenshots
bind = , PRINT, exec, hyprshot -m window --freeze -o ~/Imagens/Screenshots
bind = SHIFT, PRINT, exec, hyprshot -m region --freeze -o ~/Imagens/Screenshots

# Sistema
bind = $mainMod, Escape, exec, hyprlock
bind = $mainMod SHIFT, Escape, exec, wlogout -b 6 -C /home/kadu/.config/wlogout/style.css -l /home/kadu/.config/wlogout/layout
bind = $mainMod, V, exec, cliphist list | wofi --dmenu | cliphist decode | wl-copy

# Foco e Janelas
bind = $mainMod, h, movefocus, l
bind = $mainMod, j, movefocus, d
bind = $mainMod, k, movefocus, u
bind = $mainMod, l, movefocus, r

bind = $mainMod CTRL, h, movewindow, l
bind = $mainMod CTRL, j, movewindow, d
bind = $mainMod CTRL, k, movewindow, u
bind = $mainMod CTRL, l, movewindow, r

# Workspaces
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Mouse
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# --- REGRAS DE JANELA (SINTAXE OFICIAL v0.54.3+) ---
# Seguindo a nova regra: match:propriedade valor, efeito valor

windowrule = match:class .*, suppress_event maximize
windowrule = match:class ^(kitty-float)$, float on
windowrule = match:class ^(kitty-float)$, size 900 600
windowrule = match:class ^(kitty-float)$, center on
windowrule = match:class ^(kitty)$, opacity 0.85 0.85
windowrule = match:title ^(Picture-in-Picture)$, float on
windowrule = match:title ^(Picture-in-Picture)$, pin on
windowrule = match:title ^(Picture-in-Picture)$, move 74% 74%

# --- Regras para o Calendário (Calcure) ---
windowrule = match:initial_class ^(kitty-calendar)$, float on
windowrule = match:initial_class ^(kitty-calendar)$, size 700 500
windowrule = match:initial_class ^(kitty-calendar)$, center on
windowrule = match:initial_class ^(kitty-calendar)$, pin on

# --- LAYER RULES (SINTAXE OFICIAL v0.54.3+) ---
layerrule = blur on, match:namespace ^(waybar)$
layerrule = ignore_alpha 0.5, match:namespace ^(waybar)$
layerrule = blur on, match:namespace ^(wofi)$
layerrule = ignore_alpha 0.5, match:namespace ^(wofi)$
layerrule = blur on, match:namespace ^(logout_dialog)$
layerrule = blur on, match:namespace ^(swaync-control-center)$
layerrule = ignore_alpha 0.5, match:namespace ^(swaync-control-center)$
layerrule = blur on, match:namespace ^(swaync-notification-window)$
layerrule = ignore_alpha 0.5, match:namespace ^(swaync-notification-window)$
