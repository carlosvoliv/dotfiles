# ===================================================================
# 🎨 APARÊNCIA & TEMA
# ===================================================================
# Deixe o Kitty gerenciar o tema automaticamente
include current-theme.conf

font_family      JetBrainsMono Nerd Font
font_size        12.0
# Ajuste fino para ícones não ficarem cortados
adjust_line_height  110%

background_opacity 0.85
cursor_shape       beam
window_padding_width 6

# ===================================================================
# 🪟 LAYOUTS & COMPORTAMENTO
# ===================================================================
# Tall: Um grande na esquerda, pilha na direita.
# Fat: Um grande em cima, pilha embaixo.
enabled_layouts tall,fat,grid

# Quando abrir novo terminal, não lembre o tamanho da janela do OS
remember_window_size  no
initial_window_width  1000
initial_window_height 650

# ===================================================================
# ⌨️ ATALHOS (KEYMAPS) - CORRIGIDO
# ===================================================================

# --- Gerenciamento de Janelas (Splits) ---
map ctrl+shift+enter launch --cwd=current
map ctrl+shift+\ launch --location=vsplit --cwd=current
map ctrl+shift+- launch --location=hsplit --cwd=current
map ctrl+shift+w close_window

# --- Navegação (Prioridade Total para o VIM) ---
map ctrl+shift+h neighboring_window left
map ctrl+shift+l neighboring_window right
map ctrl+shift+k neighboring_window up
map ctrl+shift+j neighboring_window down

# --- Controle de Layout ---
map ctrl+shift+space next_layout

# --- Redimensionar (Resize) ---
map alt+shift+h resize_window narrower
map alt+shift+l resize_window wider
map alt+shift+k resize_window taller
map alt+shift+j resize_window shorter

# --- Rolagem (Scroll) ---
map ctrl+shift+u scroll_page_up
map ctrl+shift+d scroll_page_down
